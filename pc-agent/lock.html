<!DOCTYPE html>
<html>

<head>
    <meta charset="UTF-8">
    <title>Planet Game Club - Ready to Battle</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@400;700;900&display=swap');

        :root {
            --primary: #7d00ff;
            --accent: #ff007a;
            --gold: #ffbd39;
            --glass: rgba(0, 0, 0, 0.7);
            --border: rgba(255, 255, 255, 0.15);
        }

        body,
        html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            font-family: 'Outfit', sans-serif;
            background: #000;
            color: #fff;
            overflow: hidden;
        }

        /* Full Background with Overlay */
        .bg-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            /* 1. Global CDN fallback (Very high quality CS-GO background) */
            background-color: #000;
            background-image:
                url('https://wallpapers.com/images/hd/cs-go-all-characters-y6rnuv9k6m0it4v0.jpg'),
                url('./bg.png');
            background-repeat: no-repeat;
            background-position: center center;
            background-size: cover;
            z-index: -2;
            animation: zoomBg 20s infinite alternate;
        }

        @keyframes zoomBg {
            0% {
                transform: scale(1);
            }

            100% {
                transform: scale(1.05);
            }
        }

        .overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle at center, transparent 30%, rgba(0, 0, 0, 0.85) 100%);
            z-index: -1;
        }

        /* 🎇 Sparks (Uchqunlar) - Ultra Lightweight Canvas */
        #sparks {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
            pointer-events: none;
        }

        /* Main Layout */
        .layout {
            display: flex;
            width: 100%;
            height: 100%;
            justify-content: space-between;
            align-items: center;
            padding: 0 80px;
            box-sizing: border-box;
            position: relative;
            z-index: 10;
        }

        .side-panel {
            width: 380px;
            background: var(--glass);
            backdrop-filter: blur(25px);
            border: 1px solid var(--border);
            border-radius: 35px;
            padding: 40px;
            box-shadow: 0 30px 60px rgba(0, 0, 0, 0.5);
            transition: all 0.4s;
        }

        .side-panel:hover {
            border-color: var(--primary);
            box-shadow: 0 0 40px rgba(125, 0, 255, 0.2);
        }

        /* Logo Area */
        .center-brand {
            text-align: center;
            flex: 1;
        }

        .logo-text {
            font-size: 80px;
            font-weight: 950;
            text-transform: uppercase;
            letter-spacing: -2px;
            line-height: 0.9;
            margin-bottom: 5px;
            background: linear-gradient(to bottom, #fff, #999);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
            text-shadow: 0 0 30px rgba(125, 0, 255, 0.4);
            animation: neonPulse 3s infinite alternate;
        }

        @keyframes neonPulse {
            0% {
                text-shadow: 0 0 20px rgba(125, 0, 255, 0.4), 0 0 40px rgba(125, 0, 255, 0.2);
                transform: scale(1);
                letter-spacing: -2px;
            }

            100% {
                text-shadow: 0 0 50px rgba(125, 0, 255, 0.8), 0 0 80px rgba(255, 0, 122, 0.4);
                transform: scale(1.02);
                letter-spacing: 2px;
            }
        }

        .sub-logo {
            font-size: 24px;
            letter-spacing: 12px;
            color: var(--gold);
            font-weight: 700;
            opacity: 0.8;
            animation: flicker 4s infinite;
        }

        @keyframes flicker {

            0%,
            100% {
                opacity: 0.8;
            }

            50% {
                opacity: 0.4;
            }

            52% {
                opacity: 0.9;
            }

            54% {
                opacity: 0.5;
            }
        }

        /* FORM STYLES */
        .panel-title {
            font-size: 22px;
            font-weight: 800;
            margin-bottom: 30px;
            color: var(--primary);
            text-transform: uppercase;
            letter-spacing: 2px;
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .input-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            font-size: 11px;
            color: #777;
            text-transform: uppercase;
            margin-bottom: 8px;
            font-weight: 900;
        }

        input {
            width: 100%;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 15px;
            color: #fff;
            font-size: 16px;
            box-sizing: border-box;
            transition: 0.3s;
        }

        input:focus {
            outline: none;
            border-color: var(--primary);
            background: rgba(255, 255, 255, 0.1);
        }

        .btn-action {
            width: 100%;
            background: linear-gradient(45deg, var(--primary), var(--accent));
            border: none;
            border-radius: 12px;
            padding: 16px;
            color: #fff;
            font-weight: 800;
            font-size: 16px;
            cursor: pointer;
            margin-top: 10px;
            box-shadow: 0 10px 20px rgba(125, 0, 255, 0.3);
        }

        .btn-action:hover {
            transform: translateY(-2px);
            box-shadow: 0 15px 30px rgba(125, 0, 255, 0.4);
        }

        /* QR AREA */
        .qr-placeholder {
            background: #fff;
            padding: 15px;
            border-radius: 20px;
            margin-bottom: 20px;
            display: inline-block;
        }

        #qrImage {
            width: 200px;
            height: 200px;
            display: block;
        }

        .qr-help {
            font-size: 13px;
            color: #aaa;
            line-height: 1.5;
        }

        /* Status & Clock */
        .status-bar {
            position: fixed;
            top: 40px;
            right: 40px;
            display: flex;
            gap: 20px;
            align-items: center;
            z-index: 100;
        }

        #timeDisplay {
            font-size: 32px;
            font-weight: 900;
        }

        .connection {
            display: flex;
            align-items: center;
            gap: 8px;
            background: rgba(0, 0, 0, 0.5);
            padding: 6px 15px;
            border-radius: 20px;
            border: 1px solid var(--border);
            font-size: 11px;
            font-weight: 700;
        }

        .dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: #ff3366;
            box-shadow: 0 0 10px #ff3366;
        }

        .online .dot {
            background: #00ff7a;
            box-shadow: 0 0 15px #00ff7a;
        }

        #errorMsg {
            color: #ff3366;
            font-size: 13px;
            margin-top: 15px;
            font-weight: 700;
        }
    </style>
</head>

<body>
    <div class="bg-container"></div>
    <div class="overlay"></div>
    <canvas id="sparks"></canvas>

    <div class="status-bar">
        <div id="timeDisplay">00:00</div>
        <div id="connectionBox" class="connection">
            <div class="dot"></div>
            <span id="statusTxt">OFFLINE</span>
        </div>
    </div>

    <div class="layout">
        <!-- LEFT: LOGIN FORM -->
        <div class="side-panel">
            <div class="panel-title">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
                    <path d="M11 16l-4-4 4-4m5 4H7"></path>
                    <circle cx="12" cy="12" r="10"></circle>
                </svg>
                O'yinga Kirish
            </div>
            <div class="input-group">
                <label>Foydalanuvchi nomi</label>
                <input type="text" id="username" placeholder="Masalan: gamer_77">
            </div>
            <div class="input-group">
                <label>Parol</label>
                <input type="password" id="password" placeholder="••••••••">
            </div>
            <button class="btn-action" id="loginBtn" onclick="doManualLogin()">TIZIMGA KIRISH</button>
            <div id="errorMsg"></div>
        </div>

        <!-- CENTER: BRAND -->
        <div class="center-brand">
            <div class="logo-text">Planet</div>
            <div class="sub-logo">GAME ZONE</div>
            <div id="pcNameLabel" style="margin-top: 30px; font-size: 13px; letter-spacing: 5px; opacity: 0.5;">PC #--
            </div>
        </div>

        <!-- RIGHT: QR LOGIN -->
        <div class="side-panel" style="text-align: center;">
            <div class="panel-title" style="justify-content: center;">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
                    <rect x="3" y="3" width="18" height="18" rx="2" ry="2"></rect>
                    <path d="M7 7h1v1H7zM16 7h1v1h-1zM7 16h1v1H7z"></path>
                </svg>
                Tezkor Kirish
            </div>
            <div class="qr-placeholder">
                <img id="qrImage" src="" alt="QR">
            </div>
            <div class="qr-help">
                Telegram bot orqali kodingizni scan qiling va o'yinni boshlang.
            </div>
        </div>
    </div>

    <script>
        const { ipcRenderer } = require('electron');

        // Clock
        function updateTime() {
            const now = new Date();
            const h = String(now.getHours()).padStart(2, '0');
            const m = String(now.getMinutes()).padStart(2, '0');
            document.getElementById('timeDisplay').innerText = h + ':' + m;
        }
        setInterval(updateTime, 1000);
        updateTime();

        // IPC Handlers
        ipcRenderer.on('set-pc-details', (event, data) => {
            document.getElementById('pcNameLabel').innerText = 'PC ' + data.name.toUpperCase();

            const botUrl = `https://t.me/X_Game123_bot/app?startapp=pc_${data.id}`;
            const qrUrl = `https://api.qrserver.com/v1/create-qr-code/?size=250x250&data=${encodeURIComponent(botUrl)}&color=000&margin=0`;
            document.getElementById('qrImage').src = qrUrl;
        });

        ipcRenderer.on('status-connected', () => {
            document.getElementById('connectionBox').classList.add('online');
            document.getElementById('statusTxt').innerText = 'ONLINE';
        });

        ipcRenderer.on('status-disconnected', () => {
            document.getElementById('connectionBox').classList.remove('online');
            document.getElementById('statusTxt').innerText = 'OFFLINE';
        });

        function doManualLogin() {
            const u = document.getElementById('username').value;
            const p = document.getElementById('password').value;
            const btn = document.getElementById('loginBtn');
            const err = document.getElementById('errorMsg');

            if (!u || !p) return;

            btn.disabled = true;
            btn.innerText = 'TEKSHIRILMOQDA...';
            err.innerText = '';

            ipcRenderer.invoke('login-attempt', { username: u, password: p }).then(res => {
                if (!res.success) {
                    err.innerText = res.error || 'Xatolik yuz berdi';
                    btn.disabled = false;
                    btn.innerText = 'TIZIMGA KIRISH';
                }
            });
        }

        // ✨ SPARKS CANVAS (Super light particles)
        const canvas = document.getElementById('sparks');
        const ctx = canvas.getContext('2d');
        let width, height, particles = [];

        function init() {
            width = canvas.width = window.innerWidth;
            height = canvas.height = window.innerHeight;
            particles = [];
            for (let i = 0; i < 40; i++) {
                particles.push({
                    x: Math.random() * width,
                    y: Math.random() * height,
                    size: Math.random() * 2 + 1,
                    speed: Math.random() * 1 + 0.5,
                    opacity: Math.random()
                });
            }
        }

        function draw() {
            ctx.clearRect(0, 0, width, height);
            ctx.fillStyle = '#fff';
            particles.forEach(p => {
                ctx.globalAlpha = p.opacity;
                ctx.beginPath();
                ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
                ctx.fill();
                p.y -= p.speed;
                if (p.y < -10) p.y = height + 10;
            });
            requestAnimationFrame(draw);
        }

        window.addEventListener('resize', init);
        init();
        draw();
    </script>
</body>

</html>
